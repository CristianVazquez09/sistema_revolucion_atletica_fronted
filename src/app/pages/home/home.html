<!-- src/app/pages/home/home.html -->
<div class="h-full bg-[#f3f3f3] flex flex-col p-4 md:p-6 gap-5">

  <!-- ── Encabezado usuario ────────────────────────────────────────────── -->
  <div class="flex items-center justify-between px-2 py-2">
    <div class="flex items-center gap-4">
      <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center shrink-0">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
      <div>
        <p class="text-xs font-medium text-gray-400 uppercase tracking-widest leading-none mb-1.5">Bienvenido</p>
        <p class="text-2xl font-medium text-gray-800 leading-none uppercase tracking-widest">{{ username || 'Usuario' }}</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-sm font-semibold px-4 py-2 rounded-full" [ngClass]="rolBadge">{{ rolLabel }}</span>
      <span class="hidden md:block text-gray-400 text-sm">{{ version }}</span>
    </div>
  </div>

  <!-- ── Cuerpo principal ──────────────────────────────────────────────── -->
  <div class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-5 min-h-0">

    <!-- Columna izquierda: logo + frase -->
    <div class="lg:col-span-1 bg-white rounded-2xl shadow-sm p-8 flex flex-col items-center justify-center gap-8">
      <img src="imagenes/logo-ra-sin-fondo.png"
           alt="Revolución Atlética"
           class="w-full max-w-[280px] object-contain" />
      <p class="text-center text-xl font-black text-gray-700 italic leading-snug">"Esfuérzate y sé valiente"</p>
    </div>

    <!-- Columna derecha: lista de novedades -->
    <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm overflow-hidden flex flex-col">

      <!-- Header lista -->
      <div class="px-6 py-4 border-b border-gray-100">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest">Novedades · {{ version }}</p>
      </div>

      <!-- Scroll de items -->
      <div class="flex-1 overflow-y-auto divide-y divide-gray-50">
        @for (n of novedadesFiltradas; track n.titulo) {
          <div class="flex items-start gap-4 px-6 py-5 hover:bg-gray-50 transition-colors">

            <!-- Thumbnail -->
            <div class="shrink-0 w-14 h-14 rounded-xl flex items-center justify-center"
                 [ngClass]="iconBg(n.color)">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24"
                   stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="n.iconPath" />
              </svg>
            </div>

            <!-- Texto -->
            <div class="flex-1 min-w-0 pt-1">
              <p class="text-sm font-bold text-gray-800 mb-1">{{ n.titulo }}</p>
              <p class="text-xs text-gray-500 leading-relaxed">{{ n.descripcion }}</p>
            </div>

          </div>
        }
      </div>

      <!-- Footer -->
      <div class="px-6 py-3 border-t border-gray-100 bg-gray-50">
        <p class="text-xs text-gray-400">Revolución Atlética · Sistema de gestión</p>
      </div>

    </div>
  </div>

</div>
